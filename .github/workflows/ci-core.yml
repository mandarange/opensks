name: ci-core

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Architecture and path guard
        run: bash scripts/check-architecture-ownership.sh
      - name: Cargo metadata
        run: cargo metadata --format-version 1 --no-deps
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Tests
        run: cargo test --workspace
      - name: Generate schemas
        run: cargo run -p xtask -- schemas
      - name: Schema drift
        run: git diff --exit-code -- schemas
      - name: Generate capability matrix
        run: cargo run -p xtask -- capability-matrix
      - name: Capability truth drift
        run: git diff --exit-code -- docs/runtime-truth-matrix.generated.md
      - name: Dependency audit placeholder
        run: cargo tree --workspace --locked >/tmp/opensks-cargo-tree.txt
