name: codeql

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "29 4 * * 2"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: codeql (${{ matrix.language }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: rust
            os: ubuntu-latest
            build-mode: none
            build-command: ""
          - language: swift
            os: macos-14
            build-mode: manual
            build-command: swift build --package-path swift
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - name: Manual build
        if: matrix.build-mode == 'manual'
        run: ${{ matrix.build-command }}
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
